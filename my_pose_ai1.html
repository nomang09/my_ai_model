<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Pose Model</title>
    <style>
        /* 전체 배경을 깔끔한 흰색(연한 회색빛 도는 화이트)으로 설정 */
        body {
            background-color: #fafafa;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: #333;
        }

        /* 컨텐츠를 담을 메인 카드 스타일 */
        .container {
            background-color: #ffffff;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(255, 193, 7, 0.15); /* 은은한 노란색 빛 셰도우 */
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 2px solid #fff3cd; /* 연한 노란색 테두리 */
        }

        /* 타이틀 스타일 */
        h1 {
            font-size: 1.5rem;
            color: #856404; /* 깊이감 있는 어두운 노란색 */
            margin-bottom: 25px;
            font-weight: 700;
        }

        /* 시작 버튼 스타일 (노란색 테마) */
        .btn-start {
            background: linear-gradient(135deg, #ffe100, #ffb300);
            border: none;
            color: #4a3b00;
            padding: 12px 35px;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 179, 0, 0.4);
            transition: all 0.2s ease-in-out;
            margin-bottom: 25px;
        }

        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 179, 0, 0.6);
        }

        .btn-start:active {
            transform: translateY(1px);
        }

        /* 캠 화면을 보여주는 캔버스 감싸는 박스 */
        .canvas-wrapper {
            position: relative;
            display: inline-block;
            border-radius: 15px;
            overflow: hidden;
            border: 4px solid #ffeeba; /* 부드러운 노란색 테두리 */
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            background-color: #f8f9fa;
            margin-bottom: 20px;
        }

        canvas {
            display: block;
        }

        /* 결과창(레이블) 컨테이너 */
        #label-container {
            margin-top: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        /* 각각의 결과 항목 스타일 */
        #label-container div {
            background-color: #fff9db; /* 연하고 따뜻한 파스텔 노란색 */
            color: #664d03;
            padding: 10px 15px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            border-left: 5px solid #ffc107; /* 왼쪽에 찐한 노란색 포인트 바 */
            text-align: left;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Teachable Machine Pose Model</h1>
    <button type="button" class="btn-start" onclick="init()">시작하기</button>
    
    <div>
        <div class="canvas-wrapper">
            <canvas id="canvas"></canvas>
        </div>
    </div>
    
    <div id="label-container"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
<script type="text/javascript">
    // 구글 티처블 머신 제공 원본 스크립트 기능 유지
    const URL = "https://teachablemachine.withgoogle.com/models/xiWr4PSRQ/";
    let model, webcam, ctx, labelContainer, maxPredictions;

    async function init() {
        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmPose.load(modelURL, metadataURL);
        maxPredictions = model.getTotalClasses();

        const size = 200;
        const flip = true; 
        webcam = new tmPose.Webcam(size, size, flip); 
        await webcam.setup(); 
        await webcam.play();
        window.requestAnimationFrame(loop);

        const canvas = document.getElementById("canvas");
        canvas.width = size; canvas.height = size;
        ctx = canvas.getContext("2d");
        labelContainer = document.getElementById("label-container");
        
        // 기존 컴포넌트 초기화 (중복 생성 방지)
        labelContainer.innerHTML = "";
        for (let i = 0; i < maxPredictions; i++) { 
            labelContainer.appendChild(document.createElement("div"));
        }
    }

    async function loop(timestamp) {
        webcam.update(); 
        await predict();
        window.requestAnimationFrame(loop);
    }

    async function predict() {
        const { pose, posenetOutput } = await model.estimatePose(webcam.canvas);
        const prediction = await model.predict(posenetOutput);

        for (let i = 0; i < maxPredictions; i++) {
            const classPrediction =
                prediction[i].className + ": " + (prediction[i].probability * 100).toFixed(0) + "%";
            labelContainer.childNodes[i].innerHTML = classPrediction;
        }

        drawPose(pose);
    }

    function drawPose(pose) {
        if (webcam.canvas) {
            ctx.drawImage(webcam.canvas, 0, 0);
            if (pose) {
                const minPartConfidence = 0.5;
                tmPose.drawKeypoints(pose.keypoints, minPartConfidence, ctx);
                tmPose.drawSkeleton(pose.keypoints, minPartConfidence, ctx);
            }
        }
    }
</script>

</body>
</html>
